  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    background: #0f0f10;
    color: white;
  }

  a {
    text-decoration: none;
  }

  .container {
    width: 90%;
    max-width: 1350px;
    margin: auto;
  }

  /* HEADER */

  header {
    background: #151518;
    border-bottom: 1px solid #2d2d31;
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(10px);
  }

  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 18px 0;
    flex-wrap: wrap;
  }

  .logo h1 {
    color: #facc15;
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1;
  }

  .logo p {
    color: #a1a1aa;
    font-size: 0.9rem;
    margin-top: 5px;
  }

  /* SEARCH */

  .search-box {
    flex: 1;
    max-width: 760px;
    display: flex;
    background: #1c1c20;
    border: 1px solid #2f2f35;
    border-radius: 14px;
    overflow: hidden;
    height: 56px;
  }

  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    padding: 0 20px;
    font-size: 1rem;
  }

  .search-box input::placeholder {
    color: #71717a;
  }

  .search-box button {
    background: #facc15;
    color: black;
    border: none;
    width: 140px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    font-size: 0.95rem;
  }

  .search-box button:hover {
    background: #fde047;
  }

  /* SECTION */

  .products {
    padding: 60px 0;
  }

  .section-title {
    font-size: 2rem;
    margin-bottom: 35px;
    font-weight: 800;
    color: white;
  }

  /* GRID */

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 22px;
  }

  /* CARD */

  .product-card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100%;
    transition: 0.25s ease;
    position: relative;
  }

  .product-card:hover {
    transform: translateY(-4px);
    border-color: #3f3f46;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  /* IMAGE */

  .product-card img {
    width: 100%;
    height: 240px;
    object-fit: contain;
    background: white;
    padding: 20px;
  }

  /* INFO */

  .product-info {
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .product-info h3 {
    font-size: 0.95rem;
    margin-bottom: 12px;
    color: #e4e4e7;
    font-weight: 500;

    display: -webkit-box;
    line-clamp: 2;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;

    min-height: 48px;
  }

  /* PRICE */

  .price {
    color: #facc15;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 18px;
  }

  /* BUTTON */

  .offer-btn {
    margin-top: auto;
    display: block;
    text-align: center;
    background: #facc15;
    color: #000;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    transition: 0.2s;
    font-size: 0.95rem;
  }

  .offer-btn:hover {
    background: #fde047;
    transform: scale(1.01);
  }

  /* RESPONSIVO */

  @media(max-width: 768px) {
    .header-content {
      flex-direction: column;
      align-items: stretch;
    }

    .search-box {
      max-width: 100%;
    }

    .logo {
      text-align: center;
    }

    .product-card img {
      height: 200px;
    }

    .section-title {
      font-size: 1.7rem;
    }
  }
</style>
</head>
