  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #09090b;
      color: white;
    }

    a {
      text-decoration: none;
    }

    .container {
      width: 90%;
      max-width: 1300px;
      margin: auto;
    }

    header {
      background: #111111;
      border-bottom: 1px solid #27272a;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
      flex-wrap: wrap;
    }

    .logo h1 {
      color: #facc15;
      font-size: 2rem;
      font-weight: 900;
    }

    .logo p {
      color: #a1a1aa;
      font-size: 0.9rem;
    }

    .search-box {
      flex: 1;
      max-width: 700px;
      display: flex;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 18px;
      overflow: hidden;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      padding: 18px;
      font-size: 1rem;
    }

    .search-box button {
      background: #facc15;
      color: black;
      border: none;
      padding: 18px 30px;
      font-weight: 700;
      cursor: pointer;
    }

    .products {
      padding: 80px 0;
    }

    /* 🔥 GRID AJUSTADO */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    /* 🔥 CARD FLEX PARA ALINHAR TUDO */
    .product-card {
      background: #111111;
      border: 1px solid #27272a;
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-8px);
      border-color: #facc15;
    }

    /* 🔥 IMAGEM MENOR E PROPORCIONAL */
    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: white;
    }

    /* 🔥 CONTEÚDO FLEX */
    .product-info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-info h3 {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .price {
      color: #facc15;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 15px;
    }

    /* 🔥 BOTÃO ALINHADO SEMPRE EM BAIXO */
    .offer-btn {
      margin-top: auto;
      display: block;
      text-align: center;
      background: #facc15;
      color: black;
      padding: 14px;
      border-radius: 18px;
      font-weight: 700;
      transition: 0.3s;
    }

    .offer-btn:hover {
      background: #fde047;
      transform: scale(1.02);
    }
  </style>
</head>
